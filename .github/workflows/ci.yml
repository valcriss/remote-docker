name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  checks:
    name: ${{ matrix.app }} - lint test build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: backend
            workspace: "@remote-docker/backend"
          - app: frontend
            workspace: "@remote-docker/frontend"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (${{ matrix.app }})
        run: npm run lint --workspace ${{ matrix.workspace }} --if-present

      - name: Test (${{ matrix.app }})
        run: npm run test --workspace ${{ matrix.workspace }} --if-present

      - name: Build (${{ matrix.app }})
        run: npm run build --workspace ${{ matrix.workspace }}
