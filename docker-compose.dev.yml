services:
  postgres:
    image: postgres:16-alpine
    container_name: remote-docker-postgres-dev
    environment:
      POSTGRES_USER: remote_docker
      POSTGRES_PASSWORD: remote_docker
      POSTGRES_DB: remote_docker
    ports:
      - "5432:5432"
    volumes:
      - remote_docker_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U remote_docker -d remote_docker"]
      interval: 5s
      timeout: 5s
      retries: 20

  adminer:
    image: adminer:4
    container_name: remote-docker-adminer-dev
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8081:8080"

volumes:
  remote_docker_postgres_data:
